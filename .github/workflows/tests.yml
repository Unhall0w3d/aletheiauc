name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy src
      - run: python -m unittest discover -s tests
      - run: python -m build
      - run: |
          python -m venv /tmp/aletheiauc-wheel-smoke
          /tmp/aletheiauc-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/aletheiauc-wheel-smoke/bin/python -c "import cisco_collab_health, paramiko"
          /tmp/aletheiauc-wheel-smoke/bin/aletheiauc --help >/dev/null
          /tmp/aletheiauc-wheel-smoke/bin/python -c "from importlib.resources import files; assert files('cisco_collab_health').joinpath('reports/assets/aletheiauc-report-hero.png').is_file()"
